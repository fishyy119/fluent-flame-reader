name: "CD Release Linux"

on:
    release:
        types:
            - "published"

jobs:
    release_linux_x86_64:
        runs-on: "ubuntu-latest"
        permissions:
            contents: "write"  # Needed by shogo82148/actions-upload-release-asset
        steps:
            - uses: "actions/checkout@v5"
            - name: "Set Up Node"
              uses: "actions/setup-node@v6"
              with:
                  node-version: "24.x"
                  cache: "npm"
            - run: "npm ci"
            - run: "npm run build"
            - run: "npm run package-linux"
            - name: "Packaging Setup"
              run: |
                sudo apt-get update
                sudo apt-get install jq

            - name: "Get App Version"
              id: "package-version"
              run: |
                version="$(jq -r '.version' package.json)"
                echo "version=${version}"
                echo "version=${version}" >> "${GITHUB_OUTPUT}"

            # For some reason, AppImage uses x86_64, tarball uses x64, and debian uses amd64 for arch?
            - name: "Upload AppImage"
              uses: "shogo82148/actions-upload-release-asset@v1.9.1"
              with:
                  upload_url: ${{ github.event.release.upload_url }}
                  asset_path: bin/linux/x64/fluentflame-reader-linux-x86_64-${{ steps.package-version.outputs.version }}.AppImage

            - name: "Upload Linux Tarball"
              uses: "shogo82148/actions-upload-release-asset@v1.9.1"
              with:
                  upload_url: ${{ github.event.release.upload_url }}
                  asset_path: bin/linux/x64/fluentflame-reader-linux-x64-${{ steps.package-version.outputs.version }}.tar.xz

            - name: "Upload .deb"
              uses: "shogo82148/actions-upload-release-asset@v1.9.1"
              with:
                  upload_url: ${{ github.event.release.upload_url }}
                  asset_path: bin/linux/x64/fluentflame-reader-linux-amd64-${{ steps.package-version.outputs.version }}.deb
